<!doctype html>
<html lang="kr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/config.js"></script>
    <title>게시글 수정</title>
    <link rel="stylesheet" href="../css/board-write.css" crossorigin="anonymous" />
</head>
<body>
<div class="wrap writePage">
    <section class="writeIntro">
        <h2>게시글 수정</h2>
    </section>

    <section class="writeShell">
        <section class="uploadPanel">
            <label class="uploadDrop" for="image">
                <input class="non-border" type="file" id="image" accept="image/*" />
                <div class="uploadEmpty" id="uploadEmpty">
                    <svg viewBox="0 0 24 24" width="32" height="32" aria-hidden="true">
                        <rect x="3" y="5" width="18" height="15" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"></rect>
                        <circle cx="9" cy="10.5" r="1.6" fill="currentColor"></circle>
                        <path d="M5 18l4.5-4.5 3 3L16 13l3 3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                    <span>사진 선택</span>
                    <p>JPG · PNG · WebP</p>
                </div>
                <img id="imagePreview" class="imagePreview" alt="선택한 사진 미리보기" />
            </label>
            <button type="button" id="imagePreviewText" class="removeImageButton">선택한 사진 지우기</button>
        </section>

        <section class="formPanel">
            <div class="inputBox">
                <label for="title">제목</label>
                <input type="text" id="title" placeholder="제목을 입력해 주세요. (최대 26자)" maxlength="26" />
            </div>
            <div class="inputBox">
                <label for="content">내용</label>
                <textarea id="content" placeholder="내용을 입력해 주세요." maxlength="1500"></textarea>
                <p class="helperText" name="content"></p>
            </div>
            <button id="submit">수정하기</button>
        </section>
    </section>
</div>
<div class="background"></div>
</body>
<script src="../js/board-write.js" type="module"></script>
</html>
