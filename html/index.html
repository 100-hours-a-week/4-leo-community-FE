<!doctype html>
<html lang="kr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/config.js"></script>
    <link rel="stylesheet" href="../css/index.css" crossorigin="anonymous" />
    <title>Leo Photos</title>
</head>
<body>
<section class="wrap feedPage">
    <section class="feedMasthead">
        <h2>새로 올라온 사진</h2>
        <p class="mastheadDate" id="mastheadDate"></p>
    </section>

    <section class="feedTop">
        <div class="searchBox">
            <svg class="searchIcon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"></circle>
                <line x1="16.65" y1="16.65" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line>
            </svg>
            <input
                id="searchInput"
                class="searchInput"
                type="text"
                placeholder="제목, 내용, 작성자 검색"
                aria-label="게시글 검색"
                minlength="2"
            />
            <button class="searchButton" type="button" aria-label="검색">검색</button>
        </div>
        <div class="sortRow isHidden" id="searchSortRow" aria-hidden="true">
            <select id="searchSortSelect" class="sortSelect" aria-label="검색 정렬">
                <option value="recent">최신순</option>
                <option value="relevance">정확도순</option>
            </select>
        </div>
        <a href="./board-write.html" id="writeLink">
            <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
                <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line>
                <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line>
            </svg>
            사진 올리기
        </a>
    </section>

    <section class="boardList" aria-label="사진 게시글 목록"></section>

    <footer class="feedFooter">Leo Photos</footer>
</section>
<div class="background"></div>
</body>
<script>
    document.getElementById('mastheadDate').textContent = new Intl.DateTimeFormat('ko-KR', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'long',
    }).format(new Date());
</script>
<script src="../js/index.js" type="module"></script>
</html>
