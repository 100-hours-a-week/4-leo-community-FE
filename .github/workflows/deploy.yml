name: Frontend CI/CD

on:
  # main 으로 가는 PR: Docker 빌드로 배포 직전 검증
  pull_request:
    branches: [main]
  # main 에 merge(push)될 때만 실제 배포
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 501479502338.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: community/frontend
  FRONTEND_INSTANCE_ID: i-071eb2c58a84c5b0a

jobs:
  # 빌드 검증: main PR 에서 이미지가 정상 빌드되는지 확인 (배포 직전, push 안 함).
  build-check:
    name: Docker Build Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0          # v7.0.0
      - name: Build image (verify only)
        run: docker build -t community-frontend:ci-check .

  # 배포: main merge 시 ECR push + SSM 배포 + 롤백
  deploy:
    name: Push & Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0          # v7.0.0

      - name: Compute image tag
        id: meta
        run: echo "image_tag=git-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d  # v6.2.2
        with:
          role-to-assume: arn:aws:iam::501479502338:role/leo-github-actions-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64            # v2.1.6

      # 불변 태그라 이미 있는 태그를 재push 하면 실패
      # 존재하면 build/push 를 건너뛰어 re-run/재배포 가능
      - name: Check if image tag exists in ECR
        id: check
        run: |
          if aws ecr describe-images --repository-name "${ECR_REPOSITORY}" \
              --image-ids imageTag="${{ steps.meta.outputs.image_tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & Push image
        if: steps.check.outputs.exists == 'false'
        run: |
          IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${{ steps.meta.outputs.image_tag }}"
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"

      - name: Deploy via SSM Run Command
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${FRONTEND_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy community-frontend ${IMAGE_TAG}" \
            --parameters commands="cd /home/ubuntu/community-frontend && bash deploy.sh ${IMAGE_TAG}" \
            --query "Command.CommandId" --output text)

          aws ssm wait command-executed \
            --command-id "${COMMAND_ID}" --instance-id "${FRONTEND_INSTANCE_ID}" || true

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" --instance-id "${FRONTEND_INSTANCE_ID}" \
            --query "StandardOutputContent" --output text
          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" --instance-id "${FRONTEND_INSTANCE_ID}" \
            --query "StandardErrorContent" --output text

          STATUS=$(aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" --instance-id "${FRONTEND_INSTANCE_ID}" \
            --query "Status" --output text)
          [ "${STATUS}" = "Success" ] || { echo "::error::deploy failed (${STATUS})"; exit 1; }